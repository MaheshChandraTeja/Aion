name: Aion Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ada toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gnat gprbuild
      - name: Build and run tests
        run: |
          gprbuild -P aion_tests.gpr
          ./bin/test_runner
